<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imagens Dinamicas</title>
</head>
<body>
    <h1>Imagem Dimamica</h1>
    <p><strong>Tente abrir esse site em dispositivos Diferentes ou simplismente aumente e diminua o tamnho do seu navegador</strong></p>
    <picture>
        <source media="(max-width: 750px)" srcset="Imagens/foto-p.png" type="image/png">
        <source media="(max-width: 1050px)" srcset="Imagens/foto-m.png" type="image/png">
        <img src="Imagens/foto-g.png" alt="imagem flexivel">
    </picture>
    <h1>Reproduzindo Áudio</h1>
    <p>Vamos aprendera usar audios no HTML5</p>
    <!-- mp3 wav ogg-->
     <audio preload="metadata" loop controls>
        <source src="midia/Musica_teste.mp3.mp3" type="audio/mpeg">
        <p><strong>infelizmente seu navegador não pode carregar audios <a href="midia/Musica_teste.mp3.mp3">Clique aqui para baixar o audio</a></strong></p>
     </audio>
    

</body>
</html>
