<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
    <style>
        body{
            background-color: blueviolet;
            font-family: Helvetica;
        }
        a{
            color: yellow;
        }

        a:visited{
            color: rgb(37, 226, 19);
        }
        a:hover{
            width: fit-content;
            background-color: red;
            text-decoration: solid;
        }
        a::after{
            content: "[link]";
            text-decoration: none;
            color: gray;
        }
    </style>
</head>
<body>
    <h1>Personalisando links</h1>
    <ul>
        <li><a href="https://gustavoguanabara.github.io" target="_blank">Repositorio no git hub</a></li>
        <li><a href="https://youtube.com/cursoemvideo/" target="_blank">Canal no you tube</a>
        </li>
        <li>
            <a href="https://Cursoemvideo.com" target="_blank">Site do curso em video</a>
        </li>
    </ul>
    
</body>
</html>
